<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Световно Първенство 2026</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .welcome-container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        p {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 50px;
        }

        /* Контейнер за бутоните-карти */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 700px;
        }

        /* Стил на големите бутони */
        .menu-card {
            background-color: #1e293b;
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: #f8fafc;
            cursor: pointer;

            /* Мазна анимация при посочване */
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .menu-card:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: #38bdf8;
            box-shadow: 0 15px 30px -10px rgba(56, 189, 248, 0.3);
        }

        .menu-card h2 {
            margin: 0 0 10px 0;
            color: #38bdf8;
            font-size: 1.6rem;
        }

        .menu-card p {
            margin: 0;
            font-size: 1rem;
            color: #94a3b8;
        }

        /* Специален цвят за бъдещите елиминации */
        .menu-card.eliminations-card:hover {
            border-color: #fbbf24;
            box-shadow: 0 15px 30px -10px rgba(251, 191, 36, 0.3);
        }
        .menu-card.eliminations-card h2 {
            color: #fbbf24;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>Световно Първенство</h1>
        <p>Следете класирането, групите и директните елиминации</p>

        <div class="menu-grid">
            <a href="/groups" class="menu-card">
                <h2>⚽ Групова Фаза</h2>
                <p>Всички групи, временно класиране и изиграни мачове</p>
            </a>

            <a href="/eliminations" class="menu-card eliminations-card">
                <h2>🏆 Елиминации</h2>
                <p>Схема на директните елиминации от 1/8 финал до финал</p>
            </a>
        </div>
    </div>

</body>
</html>
